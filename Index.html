<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>64-Band Mobile & Tab Universal Equalizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #050608;
      color: #e1e6f0; font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center; padding: 12px;
    }

    .eq-card {
      width: 100%; height: 100%; max-width: 1400px; max-height: 750px;
      background: rgba(13, 15, 23, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 20px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 12px; flex-wrap: wrap; gap: 10px;
    }

    .title-area h1 {
      font-size: 1.2rem; font-weight: 900;
      background: linear-gradient(90deg, #00ffcc, #0077ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .title-area p { font-size: 0.7rem; color: #5a657b; }

    .action-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn-action {
      background: linear-gradient(135deg, #00ffcc, #0088ff);
      color: #030406; border: none; padding: 8px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); transition: 0.2s;
    }
    .btn-action:hover { transform: translateY(-1px); }

    .btn-mic {
      background: linear-gradient(135deg, #ff9900, #ff5500);
      color: #fff; border: none; padding: 8px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 800; cursor: pointer;
    }

    .btn-reset {
      background: rgba(255, 0, 85, 0.1); color: #ff3377; border: 1px solid rgba(255, 0, 85, 0.3);
      padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }

    .player-box {
      background: rgba(8, 9, 14, 0.8); padding: 8px 12px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; gap: 10px;
    }
    audio { width: 100%; height: 32px; outline: none; }

    .eq-sliders {
      flex: 1; display: flex; gap: 3px; overflow-x: auto;
      align-items: center; padding: 8px 0; min-height: 0;
    }

    .slider-group {
      flex: 1; min-width: 17px; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      background: rgba(8, 9, 14, 0.7); padding: 6px 1px; border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .val-label { font-size: 0.52rem; color: #00ffcc; font-weight: 700; min-height: 10px; }
    .freq-label { font-size: 0.5rem; color: #525d73; font-weight: 600; }

    .slider-group input[type="range"] {
      -webkit-appearance: none; writing-mode: bt-lr; appearance: slider-vertical;
      width: 3px; height: 70%; background: #121520; border-radius: 2px; outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 11px; height: 10px; border-radius: 2px;
      background: #00ffcc; box-shadow: 0 0 8px #00ffcc; cursor: pointer;
    }

    .eq-sliders::-webkit-scrollbar { height: 5px; }
    .eq-sliders::-webkit-scrollbar-thumb { background: #1a1e2d; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="eq-card">
    <div class="top-bar">
      <div class="title-area">
        <h1>64-BAND MASTER EQUALIZER</h1>
        <p>Universal Mobile & Tablet Engine</p>
      </div>
      <div class="action-btns">
        <input type="file" id="fileInput" accept="audio/*" style="display: none;">
        <button class="btn-action" onclick="document.getElementById('fileInput').click()">📁 Open Song</button>
        <button class="btn-mic" id="btnMic">🎤 Mic Input</button>
        <button class="btn-action" id="btnLink">💻 Tab Link</button>
        <button class="btn-reset" id="btnReset">Reset</button>
      </div>
    </div>

    <div class="player-box">
      <audio id="mainAudio" controls></audio>
    </div>

    <div class="eq-sliders" id="eqSliders"></div>
  </div>

  <script>
    const AudioEngine = (function () {
      'use strict';
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      let audioCtx = null;
      let sourceNode = null;
      let filters = [];

      const FREQUENCIES = [];
      const minF = 20, maxF = 20000, totalBands = 64;
      for (let i = 0; i < totalBands; i++) {
        let freq = minF * Math.pow(maxF / minF, i / (totalBands - 1));
        FREQUENCIES.push(Math.round(freq * 10) / 10);
      }

      function ensureContext() {
        if (!audioCtx) {
          audioCtx = new AudioContext();
        } else if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function attachSource(inputSource) {
        ensureContext();
        if (sourceNode) sourceNode.disconnect();

        if (inputSource instanceof MediaStream) {
          sourceNode = audioCtx.createMediaStreamSource(inputSource);
        } else if (inputSource instanceof HTMLMediaElement) {
          sourceNode = audioCtx.createMediaElementSource(inputSource);
        } else {
          return;
        }

        filters = FREQUENCIES.map((freq) => {
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'peaking';
          filter.frequency.value = freq;
          filter.Q.value = 4.3;
          filter.gain.value = 0;
          return filter;
        });

        sourceNode.connect(filters[0]);
        for (let i = 0; i < filters.length - 1; i++) {
          filters[i].connect(filters[i + 1]);
        }
        filters[filters.length - 1].connect(audioCtx.destination);
      }

      function setGain(bandIndex, gainValue) {
        if (filters[bandIndex] && audioCtx) {
          filters[bandIndex].gain.setTargetAtTime(gainValue, audioCtx.currentTime, 0.01);
        }
      }

      function reset() {
        if (audioCtx) {
          filters.forEach((filter) => {
            filter.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
          });
        }
      }

      return { attachSource, setGain, reset, FREQUENCIES };
    })();

    document.addEventListener('DOMContentLoaded', () => {
      const eqSliders = document.getElementById('eqSliders');
      const fileInput = document.getElementById('fileInput');
      const mainAudio = document.getElementById('mainAudio');
      const btnMic = document.getElementById('btnMic');
      const btnLink = document.getElementById('btnLink');
      const btnReset = document.getElementById('btnReset');
      let isElementConnected = false;

      AudioEngine.FREQUENCIES.forEach((freq, index) => {
        const group = document.createElement('div');
        group.className = 'slider-group';

        const valLabel = document.createElement('span');
        valLabel.className = 'val-label';
        valLabel.innerText = '0';

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = '-12'; slider.max = '12'; slider.value = '0'; slider.step = '0.5';

        let labelText = freq >= 1000 ? (freq / 1000).toFixed(1) + 'k' : Math.round(freq);
        const freqLabel = document.createElement('span');
        freqLabel.className = 'freq-label';
        freqLabel.innerText = labelText;

        slider.addEventListener('input', (e) => {
          valLabel.innerText = e.target.value > 0 ? `+${e.target.value}` : e.target.value;
          AudioEngine.setGain(index, parseFloat(e.target.value));
        });

        group.appendChild(valLabel);
        group.appendChild(slider);
        group.appendChild(freqLabel);
        eqSliders.appendChild(group);
      });

      // 1. Local Audio File Playback
      fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
          mainAudio.src = URL.createObjectURL(this.files[0]);
          mainAudio.play();
          if (!isElementConnected) {
            AudioEngine.attachSource(mainAudio);
            isElementConnected = true;
          }
        }
      });

      mainAudio.addEventListener('play', () => {
        if (!isElementConnected) {
          AudioEngine.attachSource(mainAudio);
          isElementConnected = true;
        }
      });

      // 2. Microphone Input (For Mobile/Tab)
      btnMic.addEventListener('click', async () => {
        try {
          const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          AudioEngine.attachSource(micStream);
          btnMic.style.background = "#00ffcc";
          btnMic.style.color = "#000";
          btnMic.innerText = "🎤 Mic Active";
        } catch (err) {
          alert("মাইক্রোফোন পারমিশন পাওয়া যায়নি!");
        }
      });

      // 3. Screen/Tab Audio Link (For PC/Laptop)
      btnLink.addEventListener('click', async () => {
        if (!navigator.mediaDevices.getDisplayMedia) {
          alert("আপনার ডিভাইস বা ব্রাউজারে 'Display Media Audio Link' সাপোর্ট করে না। দয়া করে '📁 Open Song' বা '🎤 Mic Input' অপশন ব্যবহার করুন।");
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
          const audioTrack = stream.getAudioTracks()[0];
          if (!audioTrack) {
            alert("অডিও কানেক্ট করার জন্য শেয়ার উইন্ডোতে 'Share tab audio' সিলেক্ট করুন!");
            return;
          }
          AudioEngine.attachSource(new MediaStream([audioTrack]));
          btnLink.innerText = "🟢 Active";
        } catch (err) {
          console.error(err);
        }
      });

      btnReset.addEventListener('click', () => {
        document.querySelectorAll('.slider-group input').forEach(input => input.value = '0');
        document.querySelectorAll('.val-label').forEach(label => label.innerText = '0');
        AudioEngine.reset();
      });
    });
  </script>
</body>
</html>
